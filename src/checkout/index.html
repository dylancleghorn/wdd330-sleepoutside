<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Checkout</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/checkout.js" type="module"></script>
  </head>
  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="products checkout-page">
        <h2>Review & Place your Order</h2>

        <div class="checkout-grid">
          <form class="checkout-form" name="checkout" novalidate>
            <fieldset>
              <legend>Customer Name</legend>
              <label>
                First Name
                <input type="text" name="fname" required />
              </label>
              <label>
                Last Name
                <input type="text" name="lname" required />
              </label>
            </fieldset>

            <fieldset>
              <legend>Address</legend>
              <label class="checkout-full">
                Street Address
                <input type="text" name="street" required />
              </label>
              <label>
                City
                <input type="text" name="city" required />
              </label>
              <label>
                State
                <input type="text" name="state" required />
              </label>
              <label>
                Zip Code
                <input type="text" name="zip" id="zip" inputmode="numeric" required />
              </label>
            </fieldset>

            <fieldset>
              <legend>Payment</legend>
              <label class="checkout-full">
                Credit Card Number
                <input
                  type="text"
                  name="cardNumber"
                  inputmode="numeric"
                  autocomplete="cc-number"
                  required
                />
              </label>
              <label>
                Expiration Date
                <input type="text" name="expiration" placeholder="MM/YY" required />
              </label>
              <label>
                Security Code
                <input
                  type="text"
                  name="code"
                  inputmode="numeric"
                  autocomplete="cc-csc"
                  required
                />
              </label>
            </fieldset>

            <button id="checkoutSubmit" type="submit">Checkout</button>
            <p id="checkout-message" class="checkout-message" aria-live="polite"></p>
          </form>

          <aside class="checkout-summary">
            <h3>Order Summary</h3>
            <div class="summary-row">
              <span>Items</span>
              <span id="num-items">0</span>
            </div>
            <div class="summary-row">
              <span>Subtotal</span>
              <span id="cartTotal">$0.00</span>
            </div>
            <div class="summary-row">
              <span>Tax</span>
              <span id="tax">$0.00</span>
            </div>
            <div class="summary-row">
              <span>Shipping Estimate</span>
              <span id="shipping">$0.00</span>
            </div>
            <div class="summary-row summary-total">
              <span>Order Total</span>
              <span id="orderTotal">$0.00</span>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
